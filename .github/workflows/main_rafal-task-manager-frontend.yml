name: Build and deploy Node.js app to Azure Web App - rafal-task-manager-frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Build
        run: |
          npm install
          npm run build
        working-directory: ./frontend
        env:
          VITE_API_URL: "https://rafal-task-manager-api-95831-gpagdmabfth9ggfe.polandcentral-01.azurewebsites.net/api"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: frontend/dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: dist

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_314FB0FAE95042A2869B8F2007BB3AE2 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A8C88B7DF7CF4E9B99DF776B2776AC24 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_0F16344BFE99466F907355C6AEEFAB04 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'rafal-task-manager-frontend'
          slot-name: 'Production'
          package: dist
          startup-command: "pm2 serve /home/site/wwwroot --no-daemon --spa"
